name: distributed-art-marketplace

services:
  postgres:
    image: postgres:16-alpine
    container_name: dam-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: dam-auth-service
    environment:
      SERVICE_PORT: ${AUTH_SERVICE_PORT}
      DB_URL: ${AUTH_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${AUTH_SERVICE_PORT}'
    networks:
      - app-net

  user-profile-service:
    build:
      context: ./services/user-profile-service
      dockerfile: Dockerfile
    container_name: dam-user-profile-service
    environment:
      SERVICE_PORT: ${USER_PROFILE_SERVICE_PORT}
      DB_URL: ${USER_PROFILE_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: user-profile-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${USER_PROFILE_SERVICE_PORT}'
    networks:
      - app-net

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: dam-catalog-service
    environment:
      SERVICE_PORT: ${CATALOG_SERVICE_PORT}
      DB_URL: ${CATALOG_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: catalog-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${CATALOG_SERVICE_PORT}'
    networks:
      - app-net

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: dam-inventory-service
    environment:
      SERVICE_PORT: ${INVENTORY_SERVICE_PORT}
      DB_URL: ${INVENTORY_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: inventory-service
      RABBITMQ_EXCHANGE: dam.domain.events.v1
      RABBITMQ_QUEUE: dam.inventory-service.v1
      RABBITMQ_RETRY_QUEUE: dam.inventory-service.retry.v1
      RABBITMQ_DLQ_QUEUE: dam.inventory-service.dlq.v1
      RABBITMQ_DLX: dam.dlx.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${INVENTORY_SERVICE_PORT}'
    networks:
      - app-net

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: dam-order-service
    environment:
      SERVICE_PORT: ${ORDER_SERVICE_PORT}
      DB_URL: ${ORDER_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: order-service
      RABBITMQ_EXCHANGE: dam.domain.events.v1
      RABBITMQ_QUEUE: dam.order-service.v1
      RABBITMQ_RETRY_QUEUE: dam.order-service.retry.v1
      RABBITMQ_DLQ_QUEUE: dam.order-service.dlq.v1
      RABBITMQ_DLX: dam.dlx.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${ORDER_SERVICE_PORT}'
    networks:
      - app-net

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: dam-payment-service
    environment:
      SERVICE_PORT: ${PAYMENT_SERVICE_PORT}
      DB_URL: ${PAYMENT_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: payment-service
      RABBITMQ_EXCHANGE: dam.domain.events.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${PAYMENT_SERVICE_PORT}'
    networks:
      - app-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: dam-notification-service
    environment:
      SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      DB_URL: ${NOTIFICATION_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: notification-service
      RABBITMQ_EXCHANGE: dam.domain.events.v1
      RABBITMQ_QUEUE: dam.notification-service.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${NOTIFICATION_SERVICE_PORT}'
    networks:
      - app-net

  audit-log-service:
    build:
      context: ./services/audit-log-service
      dockerfile: Dockerfile
    container_name: dam-audit-log-service
    environment:
      SERVICE_PORT: ${AUDIT_LOG_SERVICE_PORT}
      DB_URL: ${AUDIT_LOG_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_NAME: audit-log-service
      RABBITMQ_EXCHANGE: dam.domain.events.v1
      RABBITMQ_QUEUE: dam.audit-log-service.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${AUDIT_LOG_SERVICE_PORT}'
    networks:
      - app-net

  gateway:
    image: nginx:1.27-alpine
    container_name: dam-gateway
    depends_on:
      - auth-service
      - user-profile-service
      - catalog-service
      - inventory-service
      - order-service
      - payment-service
      - notification-service
      - audit-log-service
    ports:
      - '${GATEWAY_PORT:-80}:80'
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    name: distributed-art-marketplace-net
