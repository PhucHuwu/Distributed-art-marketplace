name: distributed-art-marketplace

services:
  postgres:
    image: postgres:16-alpine
    container_name: dam-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  auth-service:
    image: node:20-alpine
    container_name: dam-auth-service
    environment:
      SERVICE_PORT: ${AUTH_SERVICE_PORT}
      DB_URL: ${AUTH_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3001);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'auth-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Auth Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Auth Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${AUTH_SERVICE_PORT}'
    networks:
      - app-net

  user-profile-service:
    image: node:20-alpine
    container_name: dam-user-profile-service
    environment:
      SERVICE_PORT: ${USER_PROFILE_SERVICE_PORT}
      DB_URL: ${USER_PROFILE_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3002);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'user-profile-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'User Profile Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>User Profile Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${USER_PROFILE_SERVICE_PORT}'
    networks:
      - app-net

  catalog-service:
    image: node:20-alpine
    container_name: dam-catalog-service
    environment:
      SERVICE_PORT: ${CATALOG_SERVICE_PORT}
      DB_URL: ${CATALOG_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3003);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'catalog-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Catalog Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Catalog Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${CATALOG_SERVICE_PORT}'
    networks:
      - app-net

  inventory-service:
    image: node:20-alpine
    container_name: dam-inventory-service
    environment:
      SERVICE_PORT: ${INVENTORY_SERVICE_PORT}
      DB_URL: ${INVENTORY_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3004);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'inventory-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Inventory Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Inventory Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${INVENTORY_SERVICE_PORT}'
    networks:
      - app-net

  order-service:
    image: node:20-alpine
    container_name: dam-order-service
    environment:
      SERVICE_PORT: ${ORDER_SERVICE_PORT}
      DB_URL: ${ORDER_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3005);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'order-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Order Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Order Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${ORDER_SERVICE_PORT}'
    networks:
      - app-net

  payment-service:
    image: node:20-alpine
    container_name: dam-payment-service
    environment:
      SERVICE_PORT: ${PAYMENT_SERVICE_PORT}
      DB_URL: ${PAYMENT_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3006);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'payment-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Payment Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Payment Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${PAYMENT_SERVICE_PORT}'
    networks:
      - app-net

  notification-service:
    image: node:20-alpine
    container_name: dam-notification-service
    environment:
      SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      DB_URL: ${NOTIFICATION_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    command: >
      sh -c "node -e \"const http=require('http');const p=Number(process.env.SERVICE_PORT||3007);const send=(res,code,obj)=>{res.writeHead(code,{'Content-Type':'application/json'});res.end(JSON.stringify(obj));};const server=http.createServer((req,res)=>{if(req.url==='/health'){return send(res,200,{success:true,service:'notification-service',status:'ok'});}if(req.url==='/openapi.json'){return send(res,200,{openapi:'3.0.3',info:{title:'Notification Service API',version:'v1'}});}if(req.url==='/docs'){res.writeHead(200,{'Content-Type':'text/html'});return res.end('<h1>Notification Service Docs Placeholder</h1>');}return send(res,404,{success:false,error:{message:'Not found'}});});server.listen(p);\""
    expose:
      - '${NOTIFICATION_SERVICE_PORT}'
    networks:
      - app-net

  audit-log-service:
    build:
      context: ./services/audit-log-service
      dockerfile: Dockerfile
    container_name: dam-audit-log-service
    environment:
      SERVICE_PORT: ${AUDIT_LOG_SERVICE_PORT}
      DB_URL: ${AUDIT_LOG_DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - '${AUDIT_LOG_SERVICE_PORT}'
    networks:
      - app-net

  gateway:
    image: nginx:1.27-alpine
    container_name: dam-gateway
    depends_on:
      - auth-service
      - user-profile-service
      - catalog-service
      - inventory-service
      - order-service
      - payment-service
      - notification-service
      - audit-log-service
    ports:
      - '${GATEWAY_PORT:-80}:80'
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    name: distributed-art-marketplace-net
